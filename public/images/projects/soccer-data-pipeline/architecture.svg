<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="600" viewBox="0 0 1160 600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#477a8a"/>
    </marker>
  </defs>

  <rect width="1160" height="600" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="44" font-size="20" font-weight="bold" fill="#020f19">Soccer Data Pipeline</text>
  <text x="40" y="66" font-size="13" fill="#5c6b74">Event-driven ETL on Google Cloud — data lake → curated zone → star-schema mart</text>

  <!-- Row 1 -->
  <!-- Cloud Scheduler -->
  <rect x="40" y="120" width="150" height="64" rx="4" fill="#e4f1f5" stroke="#477a8a" stroke-width="1.5"/>
  <text x="115" y="147" font-size="14" font-weight="bold" fill="#0d1c27" text-anchor="middle">Cloud Scheduler</text>
  <text x="115" y="166" font-size="12" fill="#5c6b74" text-anchor="middle">cron trigger</text>

  <!-- extractor-cf -->
  <rect x="250" y="120" width="190" height="64" rx="4" fill="#ffffff" stroke="#477a8a" stroke-width="1.5"/>
  <text x="345" y="147" font-size="14" font-weight="bold" fill="#0d1c27" text-anchor="middle">extractor-cf</text>
  <text x="345" y="166" font-size="12" fill="#5c6b74" text-anchor="middle">StatsBomb open data → Parquet</text>

  <!-- GCS raw data lake (cylinder) -->
  <path d="M 500 132 a 85 12 0 0 0 170 0 v 44 a 85 12 0 0 1 -170 0 z" fill="#ffffff" stroke="#477a8a" stroke-width="1.5"/>
  <ellipse cx="585" cy="132" rx="85" ry="12" fill="#e4f1f5" stroke="#477a8a" stroke-width="1.5"/>
  <text x="585" y="160" font-size="14" font-weight="bold" fill="#0d1c27" text-anchor="middle">Cloud Storage</text>
  <text x="585" y="178" font-size="12" fill="#5c6b74" text-anchor="middle">raw data lake</text>

  <!-- Pub/Sub -->
  <rect x="740" y="120" width="140" height="64" rx="4" fill="#e4f1f5" stroke="#477a8a" stroke-width="1.5"/>
  <text x="810" y="147" font-size="14" font-weight="bold" fill="#0d1c27" text-anchor="middle">Pub/Sub</text>
  <text x="810" y="166" font-size="12" fill="#5c6b74" text-anchor="middle">object-finalize events</text>

  <!-- ingest-cf -->
  <rect x="950" y="120" width="150" height="64" rx="4" fill="#ffffff" stroke="#477a8a" stroke-width="1.5"/>
  <text x="1025" y="147" font-size="14" font-weight="bold" fill="#0d1c27" text-anchor="middle">ingest-cf</text>
  <text x="1025" y="166" font-size="12" fill="#5c6b74" text-anchor="middle">stage into curated zone</text>

  <!-- Row 1 arrows -->
  <line x1="190" y1="152" x2="243" y2="152" stroke="#477a8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="152" x2="493" y2="152" stroke="#477a8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="670" y1="152" x2="733" y2="152" stroke="#477a8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="880" y1="152" x2="943" y2="152" stroke="#477a8a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ingest-cf down to curated -->
  <line x1="1025" y1="184" x2="1025" y2="273" stroke="#477a8a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 2 (right to left) -->
  <!-- Curated zone (cylinder) -->
  <path d="M 940 292 a 85 12 0 0 0 170 0 v 44 a 85 12 0 0 1 -170 0 z" fill="#ffffff" stroke="#477a8a" stroke-width="1.5"/>
  <ellipse cx="1025" cy="292" rx="85" ry="12" fill="#e4f1f5" stroke="#477a8a" stroke-width="1.5"/>
  <text x="1025" y="320" font-size="14" font-weight="bold" fill="#0d1c27" text-anchor="middle">Cloud Storage</text>
  <text x="1025" y="338" font-size="12" fill="#5c6b74" text-anchor="middle">curated zone (Parquet)</text>

  <!-- transform-cf -->
  <rect x="700" y="284" width="160" height="64" rx="4" fill="#ffffff" stroke="#477a8a" stroke-width="1.5"/>
  <text x="780" y="311" font-size="14" font-weight="bold" fill="#0d1c27" text-anchor="middle">transform-cf</text>
  <text x="780" y="330" font-size="12" fill="#5c6b74" text-anchor="middle">normalize + model</text>

  <!-- loader-cf -->
  <rect x="470" y="284" width="150" height="64" rx="4" fill="#ffffff" stroke="#477a8a" stroke-width="1.5"/>
  <text x="545" y="311" font-size="14" font-weight="bold" fill="#0d1c27" text-anchor="middle">loader-cf</text>
  <text x="545" y="330" font-size="12" fill="#5c6b74" text-anchor="middle">idempotent loads</text>

  <!-- Postgres mart (cylinder) -->
  <path d="M 200 292 a 95 12 0 0 0 190 0 v 44 a 95 12 0 0 1 -190 0 z" fill="#ffffff" stroke="#477a8a" stroke-width="1.5"/>
  <ellipse cx="295" cy="292" rx="95" ry="12" fill="#e4f1f5" stroke="#477a8a" stroke-width="1.5"/>
  <text x="295" y="320" font-size="14" font-weight="bold" fill="#0d1c27" text-anchor="middle">Cloud SQL · Postgres</text>
  <text x="295" y="338" font-size="12" fill="#5c6b74" text-anchor="middle">star-schema data mart</text>

  <!-- APIs -->
  <rect x="40" y="284" width="110" height="64" rx="4" fill="#e4f1f5" stroke="#477a8a" stroke-width="1.5"/>
  <text x="95" y="311" font-size="14" font-weight="bold" fill="#0d1c27" text-anchor="middle">APIs</text>
  <text x="95" y="330" font-size="12" fill="#5c6b74" text-anchor="middle">analytics</text>

  <!-- Row 2 arrows (leftward) -->
  <line x1="940" y1="316" x2="867" y2="316" stroke="#477a8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="903" y="304" font-size="10" fill="#8a99a3" text-anchor="middle">Pub/Sub</text>
  <line x1="700" y1="316" x2="627" y2="316" stroke="#477a8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="663" y="304" font-size="10" fill="#8a99a3" text-anchor="middle">Parquet</text>
  <line x1="470" y1="316" x2="397" y2="316" stroke="#477a8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="316" x2="157" y2="316" stroke="#477a8a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Terraform band -->
  <rect x="40" y="430" width="1060" height="80" rx="4" fill="none" stroke="#477a8a" stroke-width="1.2" stroke-dasharray="6 5"/>
  <text x="570" y="464" font-size="14" font-weight="bold" fill="#0d1c27" text-anchor="middle">Terraform (tf repo)</text>
  <text x="570" y="486" font-size="12.5" fill="#5c6b74" text-anchor="middle">Provisions all infrastructure — Cloud Functions Gen 2 · Cloud Storage · Pub/Sub · Cloud Scheduler · Cloud SQL · IAM (least privilege)</text>

  <!-- Footer note -->
  <text x="40" y="560" font-size="11.5" fill="#8a99a3">Each stage is an independent Cloud Function repository; events flow via Pub/Sub for elastic, bursty ingestion.</text>
</svg>
