<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="640" viewBox="0 0 1160 640" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#477a8a"/>
    </marker>
  </defs>

  <rect width="1160" height="640" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="44" font-size="20" font-weight="bold" fill="#020f19">DevX AI Enablement</text>
  <text x="40" y="66" font-size="13" fill="#5c6b74">Agentic development workflow — ticket to merge request, with a human gate at every phase</text>

  <!-- Jira ticket -->
  <rect x="30" y="150" width="160" height="64" rx="4" fill="#e4f1f5" stroke="#477a8a" stroke-width="1.5"/>
  <text x="110" y="177" font-size="14" font-weight="bold" fill="#0d1c27" text-anchor="middle">Ticket</text>
  <text x="110" y="196" font-size="11" fill="#5c6b74" text-anchor="middle">issue + acceptance criteria</text>

  <!-- Orchestrator container -->
  <rect x="220" y="104" width="900" height="150" rx="6" fill="none" stroke="#9db6c0" stroke-width="1.2" stroke-dasharray="6 5"/>
  <text x="238" y="128" font-size="12" font-weight="bold" fill="#5c6b74" letter-spacing="1">ORCHESTRATOR SKILL — VALIDATES EVERY PHASE, MANAGES TICKET LIFECYCLE</text>

  <!-- planning-agent -->
  <rect x="250" y="150" width="160" height="64" rx="4" fill="#ffffff" stroke="#477a8a" stroke-width="1.5"/>
  <text x="330" y="177" font-size="14" font-weight="bold" fill="#0d1c27" text-anchor="middle">planning-agent</text>
  <text x="330" y="196" font-size="12" fill="#5c6b74" text-anchor="middle">repo analysis → plan</text>

  <!-- gate 1 -->
  <rect x="440" y="162" width="100" height="40" rx="20" fill="#e4f1f5" stroke="#477a8a" stroke-width="1.3"/>
  <text x="490" y="186" font-size="11" font-weight="bold" fill="#0d1c27" text-anchor="middle">plan approved</text>

  <!-- implementation-agent -->
  <rect x="570" y="150" width="180" height="64" rx="4" fill="#ffffff" stroke="#477a8a" stroke-width="1.5"/>
  <text x="660" y="177" font-size="14" font-weight="bold" fill="#0d1c27" text-anchor="middle">implementation-agent</text>
  <text x="660" y="196" font-size="12" fill="#5c6b74" text-anchor="middle">branch · code · tests · commit</text>

  <!-- gate 2 -->
  <rect x="780" y="162" width="100" height="40" rx="20" fill="#e4f1f5" stroke="#477a8a" stroke-width="1.3"/>
  <text x="830" y="186" font-size="11" font-weight="bold" fill="#0d1c27" text-anchor="middle">commit approved</text>

  <!-- qa-agent -->
  <rect x="910" y="150" width="180" height="64" rx="4" fill="#ffffff" stroke="#477a8a" stroke-width="1.5"/>
  <text x="1000" y="177" font-size="14" font-weight="bold" fill="#0d1c27" text-anchor="middle">qa-agent</text>
  <text x="1000" y="196" font-size="12" fill="#5c6b74" text-anchor="middle">tests · coverage · security</text>

  <!-- flow arrows row 1 -->
  <line x1="170" y1="182" x2="243" y2="182" stroke="#477a8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="182" x2="433" y2="182" stroke="#477a8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="182" x2="563" y2="182" stroke="#477a8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="182" x2="773" y2="182" stroke="#477a8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="880" y1="182" x2="903" y2="182" stroke="#477a8a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- qa down to MR -->
  <line x1="1000" y1="214" x2="1000" y2="293" stroke="#477a8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1052" y="280" font-size="10" fill="#8a99a3" text-anchor="middle">QA approved</text>

  <!-- Merge request -->
  <rect x="910" y="300" width="180" height="64" rx="4" fill="#ffffff" stroke="#477a8a" stroke-width="1.5"/>
  <text x="1000" y="327" font-size="14" font-weight="bold" fill="#0d1c27" text-anchor="middle">Merge request</text>
  <text x="1000" y="346" font-size="12" fill="#5c6b74" text-anchor="middle">labeled ai-assisted</text>

  <!-- Human review -->
  <rect x="600" y="300" width="200" height="64" rx="4" fill="#e4f1f5" stroke="#477a8a" stroke-width="1.5"/>
  <text x="700" y="327" font-size="14" font-weight="bold" fill="#0d1c27" text-anchor="middle">Human review + merge</text>
  <text x="700" y="346" font-size="12" fill="#5c6b74" text-anchor="middle">nothing merges autonomously</text>

  <!-- Feedback -->
  <rect x="250" y="300" width="240" height="64" rx="4" fill="#ffffff" stroke="#477a8a" stroke-width="1.5"/>
  <text x="370" y="327" font-size="14" font-weight="bold" fill="#0d1c27" text-anchor="middle">Developer feedback</text>
  <text x="370" y="346" font-size="12" fill="#5c6b74" text-anchor="middle">refines skills, agents, and repo docs</text>

  <!-- row 2 arrows -->
  <line x1="910" y1="332" x2="807" y2="332" stroke="#477a8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="332" x2="497" y2="332" stroke="#477a8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 370 300 L 370 280 L 330 280 L 330 261" fill="none" stroke="#477a8a" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

  <!-- Guardrails band -->
  <rect x="40" y="430" width="1080" height="106" rx="4" fill="none" stroke="#477a8a" stroke-width="1.2" stroke-dasharray="6 5"/>
  <text x="58" y="458" font-size="12" font-weight="bold" fill="#5c6b74" letter-spacing="1">GUARDRAILS — DETERMINISTIC, ON EVERY TOOL CALL</text>
  <text x="58" y="484" font-size="12.5" fill="#5c6b74">Pre/post-tool hooks block destructive commands and sensitive-file reads · every write validated and audited · per-skill allowed-tools</text>
  <text x="58" y="506" font-size="12.5" fill="#5c6b74">Integrations inherit each system's RBAC (never elevated) · secret scanning is a hard stop · OpenTelemetry traces every session into org dashboards</text>

  <!-- Footer -->
  <text x="40" y="590" font-size="11.5" fill="#8a99a3">The orchestrator re-validates each phase itself — artifacts exist, branches and commits are real, tests actually pass — rather than trusting agent claims.</text>
</svg>
